<div class="chat-container">
  <!-- Header -->
  <div class="chat-header">
    <button class="back-btn" (click)="goBack()">←</button>
    <div class="user-info" (click)="goToProfile()">
      <img [src]="userAvatar()" class="avatar-small" [alt]="userName()">
      <div>
        <div class="user-name">{{ userName() }}</div>
        <div class="user-status">
          @if (isConnected()) {
            <span class="online">● En línea</span>
          } @else {
            <span class="connecting">○ Conectando...</span>
          }
        </div>
      </div>
    </div>

    <!-- Botón tres puntos + menú -->
    <div class="menu-wrapper">
      <button class="menu-btn" (click)="toggleMenu()">⋮</button>
      @if (menuOpen) {
        <div class="dropdown-menu">
          <button class="dropdown-item block-item" (click)="blockUser()">
            🚫 Bloquear usuario
          </button>
          <button class="dropdown-item report-item" (click)="openReportModal()">
            ⚠️ Reportar usuario
          </button>
        </div>
      }
    </div>
  </div>

  <!-- Messages -->
  <div class="messages-container" #messagesContainer>
    @for (message of messages(); track $index) {
      <div class="message" [class.sent]="message.sender_id === currentUserId">
        <div class="message-bubble">
          {{ message.message }}
        </div>
        <div class="message-time">{{ message.timestamp }}</div>
      </div>
    }
  </div>

  <!-- Input -->
  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="newMessage"
      (keyup.enter)="sendMessage()"
      [placeholder]="isConnected() ? 'Escribe un mensaje...' : 'Conectando...'"
      [disabled]="!isConnected()">
    <button class="send-btn" (click)="sendMessage()" [disabled]="!isConnected() || !newMessage.trim()">
      ➤
    </button>
  </div>
</div>

<!-- Modal de reporte -->
@if (showReportModal) {
  <div class="modal-overlay" (click)="closeReportModal()">
    <div class="modal-box" (click)="$event.stopPropagation()">
      <h3 class="modal-title">⚠️ Reportar a {{ userName() }}</h3>
      <p class="modal-subtitle">Cuéntanos qué ha pasado. Tu reporte es anónimo.</p>

      <div class="reason-options">
        <button
          class="reason-btn"
          [class.selected]="reportReason === 'Comportamiento inapropiado'"
          (click)="reportReason = 'Comportamiento inapropiado'">
          Comportamiento inapropiado
        </button>
        <button
          class="reason-btn"
          [class.selected]="reportReason === 'Acoso o amenazas'"
          (click)="reportReason = 'Acoso o amenazas'">
          Acoso o amenazas
        </button>
        <button
          class="reason-btn"
          [class.selected]="reportReason === 'Perfil falso'"
          (click)="reportReason = 'Perfil falso'">
          Perfil falso
        </button>
        <button
          class="reason-btn"
          [class.selected]="reportReason === 'Contenido ofensivo'"
          (click)="reportReason = 'Contenido ofensivo'">
          Contenido ofensivo
        </button>
        <button
          class="reason-btn"
          [class.selected]="reportReason === 'Otro'"
          (click)="reportReason = 'Otro'">
          Otro
        </button>
      </div>

      <div class="modal-actions">
        <button class="modal-cancel" (click)="closeReportModal()">Cancelar</button>
        <button
          class="modal-confirm"
          (click)="reportUser()"
          [disabled]="!reportReason.trim() || reportSending()">
          @if (reportSending()) {
            Enviando...
          } @else {
            Enviar reporte
          }
        </button>
      </div>
    </div>
  </div>
}
