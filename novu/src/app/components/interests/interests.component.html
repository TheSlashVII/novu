<div class="flex h-screen w-full font-black">

  <!-- Sidebar izquierdo -->
  <aside class="w-[340px] min-h-screen flex flex-col bg-gradient-to-b from-[#4a3d7a] via-[#3d2e6e] to-[#2a1a52] px-8 py-6 flex-shrink-0">
    <!-- Logo -->
    <div class="flex items-center gap-2 mb-16">
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-pink-400 via-purple-400 to-blue-400 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
      <span class="text-white text-xl font-black tracking-tight">novu</span>
    </div>

    <!-- Texto descriptivo -->
    <div class="mt-4">
      <p class="text-white text-[1.05rem] font-black leading-snug">
        Selecciona tus intereses para poder conectarte con las personas indicadas
      </p>
    </div>
  </aside>

  <!-- Panel derecho -->
  <main class="flex-1 min-h-screen bg-[#7b8fe8] flex flex-col items-center relative">

    <!-- Título -->
    <h1 class="text-white text-[2rem] font-black mt-10 tracking-tight">Elige tus intereses</h1>

    <!-- Chips de intereses -->
    <div class="flex flex-wrap justify-center gap-x-6 gap-y-4 mt-auto mb-auto px-16 max-w-[780px]">
      @for (interest of interests; track interest.label) {
        <button
          (click)="toggleInterest(interest)"
          [class]="getChipClass(interest)"
        >
          {{ interest.label }}
        </button>
      }
    </div>

    <!-- Botón Siguiente -->
    <div class="absolute bottom-10 right-10">
      <button
        class="bg-white text-black font-black text-base px-10 py-3 rounded-full shadow-lg hover:bg-gray-100 transition-colors duration-200 tracking-tight"
      >
        Siguiente
      </button>
    </div>

  </main>
</div>
