<div class="flex h-screen w-full font-poppins">

  <aside class="w-80 min-h-screen flex flex-col bg-gradient-to-b from-violet-800 via-violet-900 to-indigo-950 px-8 py-6 flex-shrink-0">
    <div class="flex items-center gap-2 mb-16">
      <img src="assets/Images/Novu_logo.svg" alt="Novu" class="w-9 h-9 object-contain"/>
      <span class="text-white text-xl font-bold tracking-tight">Novu</span>
    </div>
    <div class="mt-4">
      <p class="text-white text-lg font-bold leading-snug">
        Selecciona tus intereses para poder conectarte con las personas indicadas
      </p>
    </div>
  </aside>

  <main class="flex-1 min-h-screen bg-indigo-400 flex flex-col items-center relative">

    <h1 class="text-white text-4xl font-bold mt-10 tracking-tight">
      Elige tus intereses
    </h1>

    <div class="flex flex-wrap justify-center gap-x-6 gap-y-4 mt-auto mb-auto px-16 max-w-3xl">
      @for (interest of interests; track interest.label) {
        <button
          (click)="toggleInterest(interest)"
          [ngClass]="interest.selected
            ? 'bg-violet-900 text-white border-violet-900'
            : 'bg-white text-gray-900 border-white'"
          class="px-8 py-3 rounded-full font-bold text-base cursor-pointer transition-all duration-200 border-2">
          {{ interest.label }}
        </button>
      }
    </div>

    <div class="absolute bottom-10 right-10">
      <button
        (click)="goNext()"
        [disabled]="!hasSelection()"
        [ngClass]="hasSelection()
          ? 'bg-white text-gray-900 cursor-pointer hover:bg-gray-100'
          : 'bg-white/40 text-white/60 cursor-not-allowed'"
        class="font-bold text-base px-10 py-3 rounded-full shadow-lg transition-all duration-200">
        Siguiente
      </button>
    </div>

  </main>
</div>
