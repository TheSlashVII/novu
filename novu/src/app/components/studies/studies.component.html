<div class="min-h-screen flex overflow-hidden font-poppins">

  <!-- Left panel -->
  <div class="hidden md:flex md:w-5/12 lg:w-2/5 flex-col justify-between p-10 bg-gradient-to-b from-[#5872D4] to-[#471767]">

    <!-- Logo -->
    <div class="flex items-center gap-2">
        <img src="assets/Images/Novu_logo.svg" alt="Novu Logo" class="w-11 h-11">
      <span class="text-white font-bold text-xl tracking-wide">novu</span>
    </div>

    <!-- Central title -->
    <div>
      <h2 class="h-170 text-white font-extrabold text-4xl leading-tight">
        Dinos más<br>sobre ti
      </h2>
    </div>

    <p class="text-white/40 text-sm">© {{ currentYear }} Novu. Todos los derechos reservados.</p>
  </div>

  <!-- Right panel -->
  <div class="flex-1 flex flex-col justify-between px-10 py-10 bg-indigo-300/60">

    <!-- Question -->
    <div class="flex flex-col items-center pt-6">
      <h1 class="font-poppins font-bold text-2xl text-indigo-900 mb-16 text-center">
        ¿Qué estas estudiando?
      </h1>

      <div class="w-full max-w-lg">
        <label class="block text-sm font-semibold text-indigo-900 mb-3">
          Nombre de los estudios más recientes
        </label>
        <input
            (search)="goNext()"
          type="text"
          [(ngModel)]="studiesName"
          placeholder="CFGS Desarrollo de aplicaciones web..."
          class="w-full px-6 py-3.5 rounded-full bg-white border-0
                 text-sm text-gray-700 placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-indigo-400
                 transition-all duration-200"/>
      </div>
    </div>

    <div class="flex justify-end gap-2 items-center">
        @if (this.isErrorMessageDisplaying) {
            <span class="text-xs">{{errorMessage}}</span>
        }
  <button
    (click)="goNext()"
    [disabled]="!studiesName.trim()"
    class="px-10 py-3.5 rounded-full font-poppins font-bold text-base transition-all duration-200 hover:scale-105 active:scale-95"
    [ngClass]="studiesName.trim()
      ? 'bg-white text-gray-900 hover:bg-gray-100 cursor-pointer'
      : 'bg-white/40 text-white/60 cursor-not-allowed'">
    Siguiente
  </button>
    </div>

  </div>

</div>
